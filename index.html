<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="title.home">Yarik Studio</title>
    <link
      rel="icon"
      href="assets/favicons/favicon-dark.svg"
      type="image/svg+xml"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img
            src="assets/favicons/favicon-light.svg"
            alt="Yarik Studio Logo"
            width="50"
            height="50"
            class="nav-logo"
          />
        </a>

        <button class="navbar-toggler" aria-label="Toggle navigation">
          <span>☰</span>
        </button>

        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="index.html" data-i18n="nav.home"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="pages/projects.html"
              data-i18n="nav.projects"
              >Projects</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="pages/members.html"
              data-i18n="nav.members"
              >Members</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/news.html" data-i18n="nav.news"
              >News</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="pages/support.html"
              data-i18n="nav.support"
              >Technical support</a
            >
          </li>
        </ul>
        <div class="controls">
          <div class="theme-switcher dropdown">
            <button class="dropdown-toggle theme-toggle">
              <span data-i18n="theme.theme">Theme</span>
            </button>
            <div class="dropdown-menu theme-dropdown">
              <a
                class="dropdown-item theme-btn"
                data-theme="auto"
                data-i18n="theme.auto"
                >Auto</a
              >
              <a
                class="dropdown-item theme-btn"
                data-theme="light"
                data-i18n="theme.light"
                >Light</a
              >
              <a
                class="dropdown-item theme-btn"
                data-theme="dark"
                data-i18n="theme.dark"
                >Dark</a
              >
            </div>
          </div>

          <div class="language-switcher dropdown">
            <button class="dropdown-toggle lang-toggle">
              <span data-i18n="language.language">Language</span>
            </button>
            <div class="dropdown-menu lang-dropdown">
              <a
                class="dropdown-item lang-btn"
                data-lang="en"
                data-i18n="language.english"
                >English</a
              >
              <a
                class="dropdown-item lang-btn"
                data-lang="ru"
                data-i18n="language.russian"
                >Russian</a
              >
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="hero text-center">
        <img src="hi" alt="Yarik Studio" class="logo-large" />
        <h1 class="fw-light">Yarik Studio</h1>
        <p class="lead text-muted" data-i18n="home.description">
          It's a creative digital company specializing in modern websites,
          mobile apps and more.
        </p>
        <p class="lead text-muted" data-i18n="home.owner">
          Owner: Yaroslav Krasulya
        </p>
        <div class="links">
          <a
            class="btn btn-primary"
            href="pages/projects.html"
            data-i18n="home.btn_projects"
            >Projects</a
          >
          <a
            class="btn btn-secondary"
            href="pages/members.html"
            data-i18n="home.btn_members"
            >Members</a
          >
          <a
            class="btn btn-secondary"
            href="pages/news.html"
            data-i18n="home.btn_news"
            >News</a
          >
          <a
            class="btn btn-secondary"
            href="pages/support.html"
            data-i18n="home.btn_support"
            >Technical support</a
          >
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <small class="text-muted">© Yarik Studio</small>
      </div>
    </footer>

    <script src="script.js"></script>
    <script src="translations.js"></script>
  </body>
</html>
